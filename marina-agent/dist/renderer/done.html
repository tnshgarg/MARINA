<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
    <title>Mark work as done</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-elev: #fafafa;
        --fg: #0f172a;
        --fg-muted: #64748b;
        --fg-faint: #94a3b8;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --accent: #3f6b54;
        --accent-soft: #e8ede7;
        --accent-strong: #2f5240;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --bg-elev: #18181b;
          --fg: #f4f4f5;
          --fg-muted: #a1a1aa;
          --fg-faint: #71717a;
          --border: #27272a;
          --border-strong: #3f3f46;
          --accent-soft: #1e2a23;
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; padding: 22px 24px; background: var(--bg); color: var(--fg); font-size: 13px; line-height: 1.5; }
      .eyebrow { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-strong); font-weight: 600; }
      h1 { font-size: 18px; font-weight: 600; margin: 4px 0 14px; letter-spacing: -0.01em; }
      label { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); font-weight: 600; display: block; margin-bottom: 6px; }
      input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: 8px; background: var(--bg-elev); color: var(--fg); font-size: 13px; font-family: inherit; }
      input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
      .row + .row { margin-top: 14px; }
      .helper { font-size: 11.5px; color: var(--fg-muted); margin-top: 4px; }
      .actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
      button { font: inherit; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--bg-elev); color: var(--fg); cursor: pointer; font-weight: 500; }
      button.primary { background: var(--accent); border-color: var(--accent); color: white; }
      button.primary:hover { background: var(--accent-strong); }
      button:disabled { opacity: 0.5; cursor: default; }
      .msg { margin-top: 10px; font-size: 12px; min-height: 16px; }
      .err { color: #be123c; }
      .ok { color: #047857; }
    </style>
  </head>
  <body>
    <p class="eyebrow">Marina</p>
    <h1>Mark work as done</h1>
    <p class="helper">Log a quick line about what you just shipped. Your manager sees it on their dashboard right away.</p>

    <form id="form" autocomplete="off" style="margin-top: 16px">
      <div class="row">
        <label for="title">What did you ship?</label>
        <input id="title" type="text" required minlength="10" maxlength="200" placeholder="e.g. Shipped onboarding redesign v2" autofocus />
      </div>
      <div class="row">
        <label for="url">Link (optional)</label>
        <input id="url" type="url" placeholder="https://github.com/… or https://figma.com/…" />
      </div>
      <div class="actions">
        <button type="button" id="cancel">Cancel</button>
        <button type="submit" class="primary" id="submit">Mark as done</button>
      </div>
      <p id="msg" class="msg"></p>
    </form>

    <script>
      const $ = (id) => document.getElementById(id)
      let busy = false

      $('cancel').addEventListener('click', () => window.marina.cancel())

      $('form').addEventListener('submit', async (e) => {
        e.preventDefault()
        if (busy) return
        busy = true
        $('submit').disabled = true
        $('submit').textContent = 'Logging…'
        $('msg').className = 'msg'
        $('msg').textContent = ''
        try {
          const res = await window.marina.submit({
            title: $('title').value,
            url: $('url').value || null,
          })
          if (res.ok) {
            $('msg').className = 'msg ok'
            $('msg').textContent = 'Logged. Closing…'
            setTimeout(() => window.marina.cancel(), 700)
          } else {
            $('msg').className = 'msg err'
            $('msg').textContent = res.error || 'Could not log.'
          }
        } catch (err) {
          $('msg').className = 'msg err'
          $('msg').textContent = String(err && err.message ? err.message : err)
        } finally {
          busy = false
          $('submit').disabled = false
          $('submit').textContent = 'Mark as done'
        }
      })
    </script>
  </body>
</html>
